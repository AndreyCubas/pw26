<div class="content-card">
  <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
    <div>
        <div class="section-title">Distribuição Mensal dos Gastos</div>
        <p class="section-copy">Distribuicao mensal dos gastos exibida como gráfico de pizza.</p>
      </div>
    </div>

    <div class="chart-shell">
      <svg viewBox="0 0 420 180" class="w-100" role="img" aria-label="Grafico de pizza de gastos">
        {% if pie_chart_segments %}
          {% for slice in pie_chart_segments %}
            <path d="{{ slice.d }}" fill="{{ slice.color }}"></path>
          {% endfor %}
          <circle cx="210" cy="90" r="50" fill="rgba(255, 255, 255, 0.08)"></circle>
          <text x="210" y="90"
                text-anchor="middle"
                dominant-baseline="middle"
                fill="#ffffff"
                font-size="18"
                font-weight="700">
              Gastos
          </text>
        {% else %}
          <circle cx="210" cy="90" r="80"
                  fill="rgba(255,255,255,0.05)"
                  stroke="rgba(255,255,255,0.08)"
                  stroke-width="2" />
          <text x="210" y="90"
                text-anchor="middle"
                dominant-baseline="middle"
                fill="var(--text-soft)"
                font-size="14">
            Sem dados
          </text>
        {% endif %}
      </svg>  
      <div class="chart-legend">
        {% for slice in pie_chart_segments %}
          <span class="chart-legend-item">
            <span class="dot" style="background: {{ slice.color }};"></span>
            {{ slice.label }}: R$ {{ slice.value|moeda_br }}
          </span>
        {% endfor %}
      </div>
    </div>
  </div>
