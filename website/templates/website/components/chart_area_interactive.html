
<div class="content-card pie-card">
  <div class="pie-header">
    <p class="pie-title">Distribuição por categoria</p>
    <p class="pie-sub">Proporção dos gastos no período selecionado</p>
  </div>

  <div class="pie-body">
    <div class="pie-svg-wrap">
      <svg id="pie-svg" viewBox="0 0 200 200" class="pie-svg" role="img"
           aria-label="Gráfico de rosca de gastos por categoria">
        {% if pie_chart_segments %}
          {% for slice in pie_chart_segments %}
            <path class="slice"
                  d="{{ slice.d }}"
                  fill="{{ slice.color }}"
                  data-label="{{ slice.label }}"
                  data-value="{{ slice.value }}">
            </path>
          {% endfor %}
          {# Buraco central do donut — ajuste r conforme seu viewBox #}
          <circle cx="210" cy="90" r="56" fill="var(--color-background-primary)"></circle>
        {% else %}
          <circle cx="100" cy="100" r="72"
                  fill="rgba(255,255,255,0.04)"
                  stroke="var(--color-border-tertiary)"
                  stroke-width="1"/>
          <text x="100" y="100"
                text-anchor="middle"
                dominant-baseline="middle"
                fill="var(--color-text-secondary)"
                font-size="13">Sem dados</text>
        {% endif %}
      </svg>

      <div class="pie-center" id="pie-center">
        <p class="pie-center-label" id="pie-center-label">Total</p>
        <p class="pie-center-val" id="pie-center-val">
          R$ {{ total_gastos|moeda_br }}
        </p>
      </div>
    </div>

    <div class="pie-legend" id="pie-legend">
      {% for slice in pie_chart_segments %}
        <div class="legend-row" data-i="{{ forloop.counter0 }}">
          <span class="legend-dot" style="background:{{ slice.color }}"></span>
          <div class="legend-info">
            <div class="legend-label">{{ slice.label }}</div>
            <div class="legend-val">R$ {{ slice.value|moeda_br }}</div>
          </div>
          <span class="legend-pct" id="pct-{{ forloop.counter0 }}"></span>
        </div>
      {% endfor %}
    </div>
  </div>
</div>
